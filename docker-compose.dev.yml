services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps # Solo necesitamos las dependencias para desarrollo
    image: ecommerce-saas:dev
    container_name: ecommerce-saas-dev
    command: pnpm dev
    ports:
      - "80:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY}
      NEXT_PUBLIC_ROOT_DOMAIN: ${NEXT_PUBLIC_ROOT_DOMAIN}
      NODE_ENV: development
    restart: always
